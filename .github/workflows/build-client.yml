name: Build Agent

on:
  push:
    tags: ["release*"]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    environment: base
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: offload-agent/frontend/package-lock.json

      - name: Build web UI
        working-directory: offload-agent/frontend
        run: npm ci && npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: offload-agent
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Type check
        working-directory: offload-agent
        run: python -m mypy

      - name: Build single-file executable
        working-directory: offload-agent
        run: |
          pyinstaller \
            --onefile \
            --name offload-agent \
            --add-data "app:app" \
            --add-data "webui.py:." \
            --add-data "frontend/dist:frontend/dist" \
            offload-agent.py

      - name: Rename binary with platform suffix
        run: cp offload-agent/dist/offload-agent offload-agent/dist/offload-agent-linux-amd64

      - name: Generate install script
        run: sed "s/__VERSION__/${GITHUB_REF_NAME}/g" install.sh > offload-agent/dist/install.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: offload-agent-linux-amd64
          path: offload-agent/dist/offload-agent-linux-amd64
          if-no-files-found: error

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            offload-agent/dist/offload-agent-linux-amd64
            offload-agent/dist/install.sh

      - name: Release to dl.alexgr.space
        if: startsWith(github.ref, 'refs/tags/')
        env:
          DL_API_KEY: ${{ secrets.RELEASER_API_KEY }}
          SKIP_BUILD: "1"
        run: bash scripts/release-agent.sh "${GITHUB_REF_NAME#release-}"
