name: Build Agent

on:
  push:
    tags: ["release*"]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    environment: base
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: agent_v2/ui-server/frontend/package-lock.json

      - name: Build web UI
        working-directory: agent_v2/ui-server/frontend
        run: npm ci && npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install GTK/WebKit (pywebview GUI build deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 libgtk-3-dev \
            gir1.2-gtk-3.0 python3-gi python3-gi-cairo \
            libwebkit2gtk-4.1-0 libwebkit2gtk-4.1-dev gir1.2-webkit2-4.1

      - name: Sync workspace
        working-directory: agent_v2
        run: uv sync

      - name: Type check
        working-directory: agent_v2
        run: uv run --with mypy mypy agent/src core/src ui-server/src --ignore-missing-imports

      - name: Stamp CLI version
        working-directory: agent_v2/cli-manager
        run: |
          printf '__version__ = "%s"\n' "${GITHUB_REF_NAME#release-}" \
            > src/cli_manager/_version.py

      - name: Build CLI executable (omq)
        working-directory: agent_v2/cli-manager
        run: |
          uv run --with pyinstaller pyinstaller \
            --onefile \
            --name omq \
            --add-data "../ui-server/frontend/dist:frontend/dist" \
            src/cli_manager/main.py

      - name: Build GUI executable (omq-gui)
        working-directory: agent_v2/gui-manager
        run: |
          uv run --with pyinstaller pyinstaller \
            --onefile \
            --windowed \
            --name omq-gui \
            --add-data "../ui-server/frontend/dist:frontend/dist" \
            src/gui_manager/main.py

      - name: Rename binaries with platform suffix
        run: |
          cp agent_v2/cli-manager/dist/omq agent_v2/cli-manager/dist/omq-linux-amd64
          cp agent_v2/gui-manager/dist/omq-gui agent_v2/gui-manager/dist/omq-gui-linux-amd64

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: omq-linux-amd64
          path: agent_v2/cli-manager/dist/omq-linux-amd64
          if-no-files-found: error

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: omq-gui-linux-amd64
          path: agent_v2/gui-manager/dist/omq-gui-linux-amd64
          if-no-files-found: error

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent_v2/cli-manager/dist/omq-linux-amd64
            agent_v2/gui-manager/dist/omq-gui-linux-amd64

      - name: Release to dl.alexgr.space
        if: startsWith(github.ref, 'refs/tags/')
        env:
          DL_API_KEY: ${{ secrets.RELEASER_API_KEY }}
          SKIP_BUILD: "1"
        run: bash scripts/release-agent.sh "${GITHUB_REF_NAME#release-}"

  build-micro-agent-linux:
    runs-on: ubuntu-latest
    environment: base
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: micro-agent/go.sum

      - name: Build micro-agent linux/amd64
        run: |
          GOOS=linux GOARCH=amd64 go build -C micro-agent -o dist/micro-agent-linux-amd64 .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: micro-agent-linux-amd64
          path: micro-agent/dist/micro-agent-linux-amd64
          if-no-files-found: error

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: micro-agent/dist/micro-agent-linux-amd64

      - name: Release to dl.alexgr.space
        if: startsWith(github.ref, 'refs/tags/')
        env:
          DL_API_KEY: ${{ secrets.RELEASER_API_KEY }}
          SKIP_BUILD: "1"
        run: bash scripts/release-micro-agent.sh "${GITHUB_REF_NAME#release-}"
