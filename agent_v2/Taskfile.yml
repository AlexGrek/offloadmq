version: "3"

vars:
  FRONTEND: ui-server/frontend
  PORT: '{{.PORT | default "8090"}}'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  # ----------------------------------------------------------------
  # Setup
  # ----------------------------------------------------------------

  install:
    desc: Sync the uv workspace and install frontend deps
    cmds:
      - uv sync
      - task: frontend:install

  frontend:install:
    desc: Install frontend npm dependencies
    dir: "{{.FRONTEND}}"
    cmds:
      - npm install

  # ----------------------------------------------------------------
  # Develop
  # ----------------------------------------------------------------

  dev:
    desc: Run the web UI (backend) + Vite dev server together
    deps: [dev:backend, dev:frontend]

  dev:backend:
    desc: Run the agent web UI on :{{.PORT}} (serves API, proxied by Vite)
    cmds:
      - uv run omq webui --port {{.PORT}}

  dev:frontend:
    desc: Run the Vite dev server (proxies /api to :{{.PORT}})
    dir: "{{.FRONTEND}}"
    cmds:
      - npm run dev

  serve:
    desc: Run the agent headless (no UI)
    cmds:
      - uv run omq serve

  gui:
    desc: Build frontend then launch the native desktop GUI
    deps: [frontend:build]
    cmds:
      - uv run omq-gui

  gui:server:
    desc: Build frontend then launch the GUI backend in headless server mode
    deps: [frontend:build]
    cmds:
      - uv run omq-gui --server --port {{.PORT}}

  # ----------------------------------------------------------------
  # Quality
  # ----------------------------------------------------------------

  check:
    desc: Run all checks (mypy + frontend typecheck)
    cmds:
      - task: typecheck
      - task: frontend:lint

  typecheck:
    desc: mypy --strict over the Python packages
    cmds:
      - uv run --with mypy mypy agent/src core/src ui-server/src --ignore-missing-imports

  frontend:lint:
    desc: Type-check the frontend (tsc)
    dir: "{{.FRONTEND}}"
    cmds:
      - npm run lint

  # ----------------------------------------------------------------
  # Build
  # ----------------------------------------------------------------

  build:
    desc: Build the frontend bundle (required before packaging / serving)
    deps: [frontend:build]

  frontend:build:
    desc: Production build of the React SPA → dist/
    dir: "{{.FRONTEND}}"
    cmds:
      - npm run build

  package:cli:
    desc: Build a single-file CLI binary (PyInstaller)
    deps: [frontend:build]
    dir: cli-manager
    cmds:
      - >-
        uv run --with pyinstaller pyinstaller --onefile --name omq
        --add-data "../ui-server/frontend/dist:frontend/dist"
        src/cli_manager/main.py

  package:gui:
    desc: Build a single-file GUI binary (PyInstaller)
    deps: [frontend:build]
    dir: gui-manager
    cmds:
      - >-
        uv run --with pyinstaller pyinstaller --onefile --windowed --name omq-gui
        --add-data "../ui-server/frontend/dist:frontend/dist"
        src/gui_manager/main.py

  installer:windows:
    desc: "Build a Windows installer (.exe) via Inno Setup — requires ISCC on PATH or default install. Pass VERSION=v0.x.y to override auto-detected version."
    platforms: [windows]
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/build-windows-installer.ps1 "{{.VERSION}}"

  # ----------------------------------------------------------------
  # Upgrade (this machine)
  # ----------------------------------------------------------------
  # Download the latest released binary from dl.alexgr.space for the running
  # platform, replace the installed binary in place, and restart the agent via
  # whatever autostart mechanism that platform uses:
  #   linux   -> omq      (CLI)  via systemd --user offloadmq-agent.service
  #   mac     -> omq-gui  (GUI)  via LaunchAgent com.offloadmq.agent
  #   windows -> omq-gui  (GUI)  via HKCU Run key "OffloadAgent"
  # Override the source with DL_BASE_URL / DL_BUCKET env vars.

  upgrade-client-on-this-linux:
    desc: Pull the latest omq (CLI) from dl.alexgr.space and restart the systemd --user service
    platforms: [linux]
    cmds:
      - |
        set -eu
        BASE="${DL_BASE_URL:-https://dl.alexgr.space}"
        BUCKET="${DL_BUCKET:-offload-agent}"
        case "$(uname -m)" in
          x86_64|amd64) A=amd64 ;;
          aarch64|arm64) A=arm64 ;;
          *) echo "unsupported arch: $(uname -m)" >&2; exit 1 ;;
        esac
        FILE="omq-linux-$A"
        URL="$BASE/rs/$BUCKET/latest/linux-$A/$FILE"
        DEST="$(command -v omq || echo "$HOME/.local/bin/omq")"
        echo "Downloading $URL"
        TMP="$(mktemp)"
        curl -fL "$URL" -o "$TMP"
        chmod +x "$TMP"
        echo "Stopping offloadmq-agent.service (user) ..."
        systemctl --user stop offloadmq-agent.service 2>/dev/null || true
        mkdir -p "$(dirname "$DEST")"
        if [ -w "$(dirname "$DEST")" ]; then mv -f "$TMP" "$DEST"; else sudo mv -f "$TMP" "$DEST"; fi
        echo "Installed -> $DEST"
        systemctl --user start offloadmq-agent.service 2>/dev/null \
          || echo "(service not installed; start manually: omq webui --start)"
        "$DEST" status || true

  upgrade-client-on-this-mac:
    desc: Pull the latest omq-gui (GUI) from dl.alexgr.space and relaunch the LaunchAgent
    platforms: [darwin]
    cmds:
      - |
        set -eu
        BASE="${DL_BASE_URL:-https://dl.alexgr.space}"
        BUCKET="${DL_BUCKET:-offload-agent}"
        case "$(uname -m)" in
          x86_64) A=amd64 ;;
          arm64) A=arm64 ;;
          *) echo "unsupported arch: $(uname -m)" >&2; exit 1 ;;
        esac
        FILE="omq-gui-darwin-$A"
        URL="$BASE/rs/$BUCKET/latest/darwin-$A/$FILE"
        DEST="$(command -v omq-gui || echo "$HOME/.local/bin/omq-gui")"
        PLIST="$HOME/Library/LaunchAgents/com.offloadmq.agent.plist"
        echo "Downloading $URL"
        TMP="$(mktemp)"
        curl -fL "$URL" -o "$TMP"
        chmod +x "$TMP"
        echo "Stopping omq-gui ..."
        if [ -f "$PLIST" ]; then launchctl unload "$PLIST" 2>/dev/null || true; fi
        pkill -f omq-gui 2>/dev/null || true
        mkdir -p "$(dirname "$DEST")"
        if [ -w "$(dirname "$DEST")" ]; then mv -f "$TMP" "$DEST"; else sudo mv -f "$TMP" "$DEST"; fi
        xattr -cr "$DEST" 2>/dev/null || true
        echo "Installed -> $DEST (Gatekeeper quarantine stripped)"
        if [ -f "$PLIST" ]; then
          launchctl load "$PLIST" 2>/dev/null || true
          echo "Relaunched via LaunchAgent."
        else
          echo "(no LaunchAgent configured; start omq-gui manually)"
        fi

  upgrade-client-on-this-windows:
    desc: Pull the latest omq-gui.exe (GUI) from dl.alexgr.space and relaunch via the HKCU Run key
    platforms: [windows]
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/upgrade-client-on-this-windows.ps1

  # ----------------------------------------------------------------
  # Clean
  # ----------------------------------------------------------------

  clean:
    desc: Remove build artifacts (dist, PyInstaller output, installer, caches)
    cmds:
      - rm -rf {{.FRONTEND}}/dist
      - rm -rf cli-manager/build cli-manager/dist cli-manager/*.spec
      - rm -rf gui-manager/build gui-manager/dist gui-manager/*.spec
      - rm -rf installer-out
      - find . -type d -name __pycache__ -prune -exec rm -rf {} +

  clean:all:
    desc: Clean artifacts plus the venv and node_modules
    deps: [clean]
    cmds:
      - rm -rf .venv
      - rm -rf {{.FRONTEND}}/node_modules
