name: kokoro

services:
  kokoro-tts:
    build:
      context: ./kokoro-fastapi
      dockerfile: docker/cpu/Dockerfile
    volumes:
      - kokoro-models:/app/api/src/models
    environment:
      - DOWNLOAD_MODEL=true
    restart: unless-stopped

  kokoro-proxy:
    image: nginx:alpine
    ports:
      - "8443:443"
    volumes:
      - ./certs/localhost.pem:/etc/nginx/certs/cert.pem:ro,z
      - ./certs/localhost-key.pem:/etc/nginx/certs/key.pem:ro,z
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro,z
    depends_on:
      - kokoro-tts
    restart: unless-stopped

volumes:
  kokoro-models:
