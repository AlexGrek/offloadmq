services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: oai
      POSTGRES_USER: oai
      POSTGRES_PASSWORD: oai_dev_password
    ports:
      - "5432:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oai -d oai"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
