{{- if .Values.ingress.enabled }}
{{- if .Values.ingress.redirectToHttps }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "oai.fullname" . }}-redirect-https
  labels:
    {{- include "oai.labels" . | nindent 4 }}
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "oai.fullname" . }}
  labels:
    {{- include "oai.labels" . | nindent 4 }}
  {{- $mwAnnotation := "" }}
  {{- if .Values.ingress.redirectToHttps }}
  {{- $mwAnnotation = printf "%s-%s-redirect-https@kubernetescrd" .Release.Namespace (include "oai.fullname" .) }}
  {{- end }}
  {{- if or .Values.ingress.annotations $mwAnnotation }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if $mwAnnotation }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ $mwAnnotation }}
    {{- end }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "oai.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
