apiVersion: v1
kind: Secret
metadata:
  name: {{ include "oai.fullname" . }}-secret
  labels:
    {{- include "oai.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: {{ .Values.secret.jwtSecret | quote }}
  database-url: {{ printf "postgres://%s:%s@%s:5432/%s" .Values.postgres.user .Values.postgres.password (include "oai.postgresHost" .) .Values.postgres.database | quote }}
  postgres-password: {{ .Values.postgres.password | quote }}
  {{- /* garage rpc secret is inlined into garage.toml; the S3 access keys are
       generated by the garage-init Job into the -garage-creds secret. */}}
