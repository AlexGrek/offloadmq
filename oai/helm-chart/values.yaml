replicaCount: 1

# Dedicated SA for the app pod: get pods + pods/log in this namespace (use POD_NAME for self only).
serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: true

image:
  repository: grekodocker/oai
  tag: latest  # overridden at deploy time via --set image.tag=<git-hash>
  pullPolicy: Always

service:
  type: ClusterIP
  port: 3000

# No CPU requests/limits: the only untainted node (ubuntu-edge-1) has just 2 CPU,
# so reserving CPU blocks scheduling. Memory is still bounded.
resources:
  requests:
    memory: 64Mi
  limits:
    memory: 256Mi

ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  host: "oai.alexgr.space"
  tls:
    secretName: oai-tls
  # Redirect all plain HTTP (web entrypoint) to HTTPS via a Traefik redirectScheme
  # Middleware attached to this ingress's router. Requests already on HTTPS are not
  # redirected (Traefik skips when the resulting URL is unchanged), so there is no loop.
  redirectToHttps: true

config:
  staticDir: "/app/static"
  rustLog: "info"

secret:
  jwtSecret: "change-me-in-production"

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "17-alpine"
    pullPolicy: IfNotPresent
  database: oai
  user: oai
  password: "change-me-in-production"
  persistence:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      memory: 128Mi
    limits:
      memory: 512Mi

garage:
  enabled: true
  replicaCount: 1
  image:
    repository: dxflrs/garage
    tag: v2.2.0
    pullPolicy: IfNotPresent
  service:
    s3Port: 3900
    rpcPort: 3901
    adminPort: 3903
  persistence:
    metadataSize: 1Gi
    dataSize: 20Gi
    storageClass: ""
  replicationFactor: 1
  # Garage requires a 32-byte hex string (64 hex chars). Also used as the admin_token.
  rpcSecret: "93f007feea2379a78f6e0ad47d6e5cbbbd2083ea0d9c89f6989f383a41b19309"
  # Optional override for garage.toml rpc_public_addr
  # (default: stateful pod-0 FQDN on the headless service).
  rpcPublicAddr: ""
  storage:
    bucket: oai
    region: us-east-1
  # post-install/post-upgrade hook Job: assigns the cluster layout (v2 admin API),
  # creates the bucket + an S3 key, and writes <release>-garage-creds (idempotent),
  # which the app consumes for STORAGE_S3_ACCESS_KEY_ID / _SECRET_ACCESS_KEY.
  init:
    kubectlVersion: "1.30.4"
    # Garage v2 layout capacity in bytes (logical weight for the layout algorithm).
    nodeCapacityBytes: "21474836480"
    accessKeyName: oai-key
  resources:
    requests:
      memory: 64Mi
    limits:
      memory: 256Mi
