{{- $existing := lookup "v1" "Secret" .Release.Namespace "offloadmq-secrets" }}
{{- if not $existing }}
apiVersion: v1
kind: Secret
metadata:
  name: offloadmq-secrets
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.JWT_SECRET | quote }}
  CLIENT_API_KEYS: {{ .Values.secrets.CLIENT_API_KEYS | quote }}
  AGENT_API_KEYS: {{ .Values.secrets.AGENT_API_KEYS | quote }}
  MGMT_TOKEN: {{ .Values.secrets.MGMT_TOKEN | quote }}
{{- end }}
