apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: offloadmq
spec:
  serviceName: offloadmq
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: offloadmq
  template:
    metadata:
      labels:
        app: offloadmq
    spec:
      {{- if .Values.k8sLogs.enabled }}
      serviceAccountName: {{ .Values.k8sLogs.serviceAccount.name | default "offloadmq" }}
      automountServiceAccountToken: true
      {{- end }}
      containers:
        - name: offloadmq
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: APP_VERSION
              value: {{ .Values.appVersion | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: offloadmq-secrets
                  key: JWT_SECRET
            - name: CLIENT_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: offloadmq-secrets
                  key: CLIENT_API_KEYS
            - name: AGENT_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: offloadmq-secrets
                  key: AGENT_API_KEYS
            - name: MGMT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: offloadmq-secrets
                  key: MGMT_TOKEN
            {{- if .Values.k8sLogs.enabled }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: FRONTEND_LABEL_SELECTOR
              value: {{ .Values.k8sLogs.frontendLabelSelector | quote }}
            {{- end }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        storageClassName: {{ if .Values.persistence.storageClass }}{{ .Values.persistence.storageClass | quote }}{{ else }}null{{ end }}
